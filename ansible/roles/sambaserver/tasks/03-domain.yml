#Ataza honetan domeinua konfiguratuko dugu
---
- name: Aurreko smb.conf fitxategia ezabatu.
  file:
    path="/etc/samba/smb.conf"
    state=absent

- name: Domeinua konfiguratu. Pasahitza aldatu beharko da.
  ansible.builtin.command:
    argv:
      - /usr/bin/samba-tool
      - domain
      - provision
      - --server-role=dc
      - --dns-backend=SAMBA_INTERNAL
      - --realm={{ full_domain_name }}
      - --domain={{ domain_name }}
      - --adminpass=DomainPass2

- name: Sortu berri den kerberos konfigurazioa kopiatu.
  copy:
    src: "/var/lib/samba/private/krb5.conf"
    dest: "/etc/krb5.conf"
    mode: 0600

- name: Kanpoko DNS zerbitzaria konfiguratu, konexiorik gabe ez gelditzeko.
  replace:
    dest: /etc/samba/smb.conf
    regexp: "dns forwarder = {{ ansible_default_ipv4.address }}"
    replace: "dns forwarder = {{ ansible_default_ipv4.network }}"

- name: smbd zerbitzua gelditu.
  service:
    name: smbd
    state: stopped

- name: nmbd zerbitzua gelditu.
  service:
    name: nmbd
    state: stopped

- name: winbind zerbitzua gelditu.
  service:
    name: winbind
    state: stopped

- name: samba zerbitzua berrabiarazi.
  service:
    name: samba
    state: restarted
