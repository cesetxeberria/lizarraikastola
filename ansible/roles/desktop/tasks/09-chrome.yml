#Google chrome instalatu eta politikak ezarri. Repositorioetan chromium dago baina...
#Ubuntun chromium paketea snap bidez instalatzen da eta ez zaigu gustatzen.
#Debianen meet-en funtzio batzuk desaktibatuta daude chromium instalatzerakoan.
---
- name: Google Chrome-ren dependentziak instalatu.
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - fonts-liberation

- name: Google-ren repoa gehitu.
  deb822_repository:
    name: google-chrome
    types: deb
    uris: https://dl.google.com/linux/chrome/deb/
#    suites: "{{ ansible_distribution_release }}"
    components: stable main
    architectures: amd64
    signed_by: https://dl.google.com/linux/linux_signing_key.pub

- name: Sistema eguneratu, repo berria irakurtzeko.
  apt:
    update_cache: yes

- name: Google Chrome instalatu.
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - google-chrome-stable

#Script bat erabiltzen dugu irekitzerakoan aukerak gehituz.
- name: Abiarazteko script-a kopiatu.
  copy:
    src: "{{ role_path }}/files/usr/local/bin/chrome"
    dest: "/usr/local/bin/chrome"
    mode: 0755

#Hau ez da beharrezkoa. Desktop fitxategi berdina jartzen dugu Ubuntu eta Debianen, xfce panela bientzat berdin konfiguratzeko.
- name: Begiratu desktop fitxategi originala existitzen den.
  stat:
    path: "/usr/share/applications/google-chrome.desktop"
  register: desktop

- name: Desktop fitxategiaren izena aldatu.
  command: mv /usr/share/applications/google-chrome.desktop /usr/share/applications/chrome.desktop
  when: desktop.stat.exists == True

- name: Chrome esteka sortu /usr/bin barruan
  file:
    src: /usr/local/bin/chrome
    dest: /usr/bin/google-chrome-stable
    state: link

- name: Eguneratzaile automatikoa kendu.
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "/etc/cron.daily/google-chrome"
    - "/opt/google/chrome/cron"

#Firefox nahiago dugunez
- name: Lehenetsitako nabigatzailea firefox jarri.
  alternatives:
    name: "{{ item }}"
    path: /usr/bin/firefox-esr
  with_items:
    - x-www-browser
    - gnome-www-browser

- name: Politiken karpeta sortu.
  file:
    path: /etc/opt/chrome/policies/managed
    state: directory
    mode: 0755

- name: Politikak ezarri.
  copy:
    src: "{{ role_path }}/files/etc/chromium/policies/managed/policies.json"
    dest: "/etc/opt/chrome/policies/managed/policies.json"
    mode: 0644

#/opt/google/chrome/master_preferences orokorra
- name: Nabigatzailea konfiguratu orokorrean.
  copy:
    src: "{{ role_path }}/files/etc/chromium/master_preferences"
    dest: "/opt/google/chrome/master_preferences"
    mode: 0644
